<style>
        @font-face {
            font-family: 'Geist';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.0.0/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Geist';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.0.0/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Geist';
            src: url('https://cdn.jsdelivr.net/npm/geist@1.0.0/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2');
            font-weight: 600;
        }

        body {
            font-family: 'Geist', sans-serif;
            background-color: #ffffff;
            color: #1b1b1b;
        }

        .glass-login-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            border: 0.5px solid rgba(231, 231, 228, 0.8);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.03);
        }

        .auralis-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .orb-1 {
            background: radial-gradient(circle, #e2e2e2 0%, transparent 70%);
            top: -200px;
            left: -100px;
        }

        .orb-2 {
            background: radial-gradient(circle, #f3f3f3 0%, transparent 70%);
            bottom: -200px;
            right: -100px;
        }

        .input-precision {
            border: 0.5px solid #E7E7E4;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-precision:focus {
            border-color: #1b1b1b;
            box-shadow: 0 0 0 1px #1b1b1b;
            outline: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
    </style>

<body class="flex flex-col min-h-screen overflow-x-hidden">
<!-- Atmospheric Background Orbs -->
<div class="auralis-orb orb-1"></div>
<div class="auralis-orb orb-2"></div>
<!-- Navigation Shell (Suppressed for focused login task as per rules, but including Brand Identity TopBar for context) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-border-subtle">
<div class="flex justify-between items-center h-nav-height px-gutter max-w-container-max mx-auto">
<div class="font-h3 text-h3 tracking-tighter text-primary">Dortmund Fleet Finance</div>
<div class="flex items-center gap-6">
<a class="font-body-md text-body-md text-secondary hover:text-primary transition-colors" href="#">Destek</a>
<a class="font-body-md text-body-md text-primary font-bold" href="#">Giriş</a>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-nav-height px-gutter">
<div class="w-full max-w-[420px] glass-login-card rounded-xl p-10 relative overflow-hidden group">
<!-- Header -->
<div class="mb-10">
<h1 class="font-h3 text-h3 text-primary mb-2 text-center">Admin Girişi</h1>
<p class="font-body-md text-body-md text-secondary text-center opacity-70">Filo yönetim sistemine hoş geldiniz.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-secondary-container block" for="email">E-POSTA ADRESI</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-secondary-container opacity-50">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-white/50 rounded-lg input-precision font-body-md text-body-md placeholder:text-on-secondary-container/40" id="email" name="email" placeholder="isim@dortmundfleet.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-secondary-container block" for="password">ŞIFRE</label>
<a class="text-[11px] font-semibold text-secondary hover:text-primary transition-colors" href="#">ŞİFREMİ UNUTTUM</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-secondary-container opacity-50">lock</span>
<input class="w-full h-12 pl-12 pr-4 bg-white/50 rounded-lg input-precision font-body-md text-body-md placeholder:text-on-secondary-container/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-border-subtle text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-secondary-container cursor-pointer select-none" for="remember">Beni hatırla</label>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary text-on-primary font-body-md text-body-md font-bold rounded-full hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Giriş Yap</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Decorative Subtle Light Leak -->
<div class="absolute -top-20 -right-20 w-40 h-40 bg-page-bg rounded-full blur-3xl opacity-50 group-hover:opacity-80 transition-opacity duration-700"></div>
</div>
</main>
<!-- Footer Shell -->
<footer class="w-full mt-section-gap-mobile md:mt-12 bg-surface-container-low border-t border-border-subtle">
<div class="grid grid-cols-12 gap-unit py-8 px-gutter max-w-container-max mx-auto">
<div class="col-span-12 md:col-span-6 flex flex-col justify-center">
<p class="font-label-caps text-label-caps text-on-secondary-container">© 2024 Dortmund Fleet Finance. Technical precision in mobility.</p>
</div>
<div class="col-span-12 md:col-span-6 flex justify-start md:justify-end items-center gap-6 mt-4 md:mt-0">
<a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-colors" href="#">Kullanım Koşulları</a>
<a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-colors" href="#">Gizlilik Politikası</a>
<a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-colors" href="#">İletişim</a>
</div>
</div>
</footer>
<script>
        // Micro-interaction for form inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.opacity = '1';
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#000000';
            });
            input.addEventListener('blur', () => {
                if(!input.value) {
                    input.parentElement.querySelector('.material-symbols-outlined').style.opacity = '0.5';
                    input.parentElement.querySelector('.material-symbols-outlined').style.color = '#626262';
                }
            });
        });

        // Atmospheric mouse move effect
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.auralis-orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            orbs.forEach((orb, index) => {
                const moveX = (x - 0.5) * (index + 1) * 30;
                const moveY = (y - 0.5) * (index + 1) * 30;
                orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body></html>
